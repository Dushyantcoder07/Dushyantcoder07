<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140">
  <defs>
    <clipPath id="circleClip">
      <circle cx="70" cy="70" r="56" />
    </clipPath>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="140" height="140" rx="20" fill="#081021" />

  <!-- pulsing ring -->
  <g transform="translate(0,0)" clip-path="url(#circleClip)">
    <circle cx="70" cy="70" r="64" stroke="#0ea5a4" stroke-opacity="0.06" stroke-width="6" fill="none" />
  </g>

  <!-- avatar image -->
  <g filter="url(#shadow)">
    <image x="14" y="14" width="112" height="112" href="https://github.com/Dushyantcoder07.png?size=400" preserveAspectRatio="xMidYMid slice" />
  </g>

  <style>
    image{transform-origin:70px 70px;transition:transform 260ms cubic-bezier(.2,.9,.3,1), filter 260ms}
    svg:hover image{transform:scale(1.06) translateY(-3px);}
    svg:hover circle{stroke-opacity:0.18}
  </style>
</svg>
