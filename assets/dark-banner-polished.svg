<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#071026">
        <animate attributeName="stop-color" values="#071026;#0b1220;#071026" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0f1724">
        <animate attributeName="stop-color" values="#0f1724;#071126;#0f1724" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)" />

  <!-- soft glowing blobs -->
  <g opacity="0.18">
    <circle cx="160" cy="60" r="160" fill="#0ea5a4" filter="url(#blur)">
      <animate attributeName="cx" values="120;180;120" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="160" r="120" fill="#7c3aed" filter="url(#blur)">
      <animate attributeName="cx" values="980;1060;980" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- code bars -->
  <g transform="translate(60,40)" fill="#9fb4c8" opacity="0.08">
    <rect x="0" y="20" width="36" height="120" rx="6">
      <animate attributeName="y" values="20;10;20" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="40" width="28" height="100" rx="6">
      <animate attributeName="y" values="40;30;40" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="96" y="10" width="20" height="140" rx="6">
      <animate attributeName="y" values="10;0;10" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Title text -->
  <g font-family="Inter, Roboto, system-ui, -apple-system, 'Segoe UI', Arial" fill="#e6eef8">
    <text x="60" y="110" font-size="46" font-weight="700">Dushyantcoder07</text>
    <text x="60" y="150" font-size="18" fill="#98a8bf">Computer Science student — Dark-theme dev • Algorithms • Clean UX</text>
  </g>

  <!-- small animated taglines -->
  <g transform="translate(60,190)" fill="#9fb4c8" font-family="Inter, Arial" font-size="13">
    <text x="0" y="14">➤ Systems programming</text>
    <text x="230" y="14">➤ Competitive programming</text>
    <text x="480" y="14">➤ Web & Tooling</text>
  </g>

  <!-- hex rotating icon -->
  <g transform="translate(980,70) scale(0.9)">
    <rect x="0" y="0" width="160" height="110" rx="16" fill="#071026" opacity="0.6" />
    <g transform="translate(80,55)">
      <polygon points="-28,-16 28,-16 40,0 28,16 -28,16 -40,0" fill="#14b8a6" opacity="0.95">
        <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <text x="18" y="105" font-size="11" fill="#98a8bf">Dark Mode Vibes</text>
  </g>

</svg>
